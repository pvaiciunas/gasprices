name: Daily Data Scrape

on:
  schedule:
    # This runs at 09:00 UTC every day (approx 4:00 AM EST)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  autoscrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        run: |
          Rscript -e 'install.packages(c("rvest", "DBI", "RSQLite"))'

      - name: Run R script
        run: Rscript scrape_data.R

      - name: Commit and Push results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Update data: $(date)" || echo "No changes to commit"
          git push
