name: Daily Data Scrape

on:
  schedule:
    - cron: '0 9 * * *' # 4:00 AM or 5:00 AM EST depending on DST
  workflow_dispatch:

jobs:
  autoscrape:
    runs-on: ubuntu-latest
    # Granting permission to write the .db file back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # Uses pre-compiled binaries for much faster installs

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rvest
            any::httr
            any::curl
            any::DBI
            any::RSQLite

      - name: Run R script
        run: Rscript scrape_data.R

      - name: Commit and Push results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Update data: $(date)" || echo "No changes to commit"
          git push
